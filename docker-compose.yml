services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  api:
    build:
      context: ./services/api
    env_file:
      - .env
    volumes:
      - ./services/api:/app
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  dashboard:
    build:
      context: ./apps/admin-dashboard
    env_file:
      - .env
    volumes:
      - ./apps/admin-dashboard:/app
      - /app/node_modules
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data: